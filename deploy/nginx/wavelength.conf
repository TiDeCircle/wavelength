# Nginx site for Wavelength.
#
# Install:
#   sudo cp deploy/nginx/wavelength.conf /etc/nginx/sites-available/wavelength
#   sudo ln -s /etc/nginx/sites-available/wavelength /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Change `server_name` below to the real hostname before installing.
# Certbot rewrites this file when it issues a certificate — after running it,
# the listen 80 block becomes a redirect and a listen 443 block is added.
#
# This runs alongside the existing portfolio site, which owns port 3000.
# Wavelength answers on 3001.

# Correct Connection header for WebSocket upgrades: "upgrade" when the client
# asked for one, empty otherwise so normal requests can keep the connection
# alive. Named uniquely because sites-enabled/* all share one http block, and
# two files defining the same map would refuse to load.
map $http_upgrade $wavelength_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;

    server_name wavelength.tideportfolio.xyz;

    # Socket.io handshakes are small; nothing here uploads files.
    client_max_body_size 2M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # The two headers that make WebSockets work at all.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $wavelength_connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # A player sitting on the lobby screen sends nothing for minutes at a
        # time. The default 60s read timeout would cut them off, so allow a
        # full hour — well past Socket.io's own 20s ping timeout, which is
        # what should be detecting real drops.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Buffering would hold back the polling transport's replies.
        proxy_buffering off;
        proxy_cache off;
    }

    # Answered by server.ts directly, so it proves the socket server is up
    # and not merely that Next is rendering.
    location = /healthz {
        proxy_pass http://127.0.0.1:3001/healthz;
        access_log off;
    }
}
